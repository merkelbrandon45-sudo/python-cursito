<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Descargador de YouTube MP3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .card { background: #fff; border-radius: 14px; padding: 30px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        h1 { margin-bottom: 15px; font-size: 1.6rem; color: #333; }
        p { color: #555; margin-bottom: 20px; }
        label { display:block; margin: 10px 0 5px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 11px 13px; border: 2px solid #ddd; border-radius: 6px; font-size: 1rem; }
        .btn { margin-top: 16px; width: 100%; background: #667eea; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 700; }
        .btn:hover { opacity: 0.95; }
        .message { margin: 15px 0; padding: 12px 14px; border-radius: 6px; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        a { color: #334ea8; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Recuperar contraseña</h1>
        <p>Usuario: <strong>{{ user_id }}</strong></p>

        {% if error %}
        <div class="message error">{{ error }}</div>
        {% endif %}

        {% if message %}
        <div class="message success">{{ message }}</div>
        {% endif %}

        <form method="POST">
            <label for="secret_answer">{{ question }}</label>
            <input type="text" id="secret_answer" name="secret_answer" placeholder="Respuesta" autocomplete="off" required>
            <button class="btn" type="submit">Validar y resetear</button>
        </form>

        <p style="margin-top: 12px;">Después de validar, crea una contraseña nueva en la pantalla de login.</p>
        <p><a href="{{ url_for('login', user_id=user_id) }}">Volver al login</a></p>
    </div>
</body>
</html>
